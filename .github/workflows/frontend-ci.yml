name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "packages/frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "packages/frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reads the pnpm version from "packageManager" in the root package.json
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: packages/frontend/pnpm-lock.yaml

      # packages/frontend is its own pnpm workspace root (it has its own
      # pnpm-workspace.yaml and a self-contained pnpm-lock.yaml), so install
      # from there rather than the repo root, whose lockfile is stale for
      # frontend deps.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec eslint src

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build
