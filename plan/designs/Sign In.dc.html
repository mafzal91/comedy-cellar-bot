<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin:0; }
    body { background:var(--bg); }

    :root{
      --bg:#FBF6EC; --surface:#ffffff; --text:#1A1714; --muted:#857B6D; --faint:#A99F8E;
      --line:#1A1714; --shadow:#1A1714; --track:#EDE7DA; --solid:#1A1714; --solid-hover:#2c2820;
      --on-solid:#F3C44C; --on-accent:#1A1714;
    }
    html[data-theme="dark"]{
      --bg:#16130E; --surface:#221E17; --text:#F2ECE0; --muted:#A99F90; --faint:#7C7468;
      --line:#3C352B; --shadow:#070503; --track:#322C22; --solid:#F3C44C; --solid-hover:#E0B43F;
      --on-solid:#1A1714;
    }
    input::placeholder { color:#B7AE9F; }
  </style>
  <script>
(function(){
  try{ if(localStorage.getItem('cc-theme')==='dark') document.documentElement.setAttribute('data-theme','dark'); }catch(e){}
  function mk(){
    if(document.getElementById('cc-theme-btn')) return;
    if(!document.body){ return setTimeout(mk,40); }
    var b=document.createElement('button');
    b.id='cc-theme-btn';
    b.style.cssText='position:fixed;right:18px;bottom:18px;z-index:99999;width:46px;height:46px;border-radius:50%;border:1.5px solid #1A1714;background:#F3C44C;color:#1A1714;font-size:20px;line-height:1;cursor:pointer;box-shadow:2px 3px 0 #1A1714;display:flex;align-items:center;justify-content:center;font-family:Archivo,sans-serif;';
    function sync(){var d=document.documentElement.getAttribute('data-theme')==='dark';b.textContent=d?'\u2600':'\u263E';b.title=d?'Switch to light mode':'Switch to dark mode';}
    b.onclick=function(){var d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');try{localStorage.setItem('cc-theme','light')}catch(e){}}else{document.documentElement.setAttribute('data-theme','dark');try{localStorage.setItem('cc-theme','dark')}catch(e){}}sync();};
    sync(); document.body.appendChild(b);
  }
  mk();
})();
  </script>
</helmet>

<div style="min-height:100vh; background:var(--bg); display:flex; flex-direction:column;">

  <div style="background:#F3C44C; padding:16px 40px; display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:baseline; gap:11px;">
      <span style="font-family:'Bebas Neue'; font-size:31px; letter-spacing:.03em; color:#1A1714; line-height:1;">COMEDY CELLAR</span>
      <span style="font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.22em; color:#1A1714; opacity:.6;">EST. NYC 1981</span>
    </div>
    <nav style="display:flex; align-items:center; gap:24px;">
      <a href="Comedy%20Cellar%20Home.dc.html" style="font-family:'Archivo'; font-weight:500; font-size:15px; color:#1A1714; opacity:.78; text-decoration:none;">Home</a>
      <a href="Comics.dc.html" style="font-family:'Archivo'; font-weight:500; font-size:15px; color:#1A1714; opacity:.78; text-decoration:none;">Comics</a>
      <a href="Updates.dc.html" style="font-family:'Archivo'; font-weight:500; font-size:15px; color:#1A1714; opacity:.78; text-decoration:none;">Updates</a>
      <a href="Sign%20In.dc.html" style="font-family:'Archivo'; font-weight:700; font-size:14px; color:#F3C44C; background:#1A1714; padding:8px 16px; border-radius:999px; text-decoration:none;">Sign In</a>
    </nav>
  </div>
  <div style="height:14px; background:#1A1714; background-image:radial-gradient(circle at center, #F3C44C 2.2px, transparent 2.8px); background-size:20px 14px;"></div>

  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:48px 24px;">
    <div style="width:100%; max-width:430px;">

      <div style="text-align:center; margin-bottom:22px;">
        <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#9A7B1E; margin-bottom:8px;">Members' Entrance</div>
        <h1 style="font-family:'Bebas Neue'; font-size:46px; line-height:.92; letter-spacing:.01em; color:var(--text); margin:0;">Take Your Seat</h1>
        <div style="font-family:'Archivo'; font-size:14px; color:var(--muted); margin-top:6px;">Welcome back — sign in to manage your reservations.</div>
      </div>

      <div style="background:var(--surface); border:1.5px solid var(--line); border-radius:16px; padding:28px 28px 24px; box-shadow:5px 6px 0 var(--shadow);">

        <button style="width:100%; display:flex; align-items:center; justify-content:center; gap:11px; cursor:pointer; background:var(--surface); border:1.5px solid var(--line); border-radius:10px; padding:13px; font-family:'Archivo'; font-weight:700; font-size:15px; color:var(--text);" style-hover="background:var(--bg);">
          <span style="width:22px; height:22px; border-radius:50%; background:var(--solid); color:var(--on-solid); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue'; font-size:15px;">G</span>
          Continue with Google
        </button>

        <div style="display:flex; align-items:center; gap:14px; margin:20px 0;">
          <div style="flex:1; height:1.5px; background:var(--track);"></div>
          <span style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint);">or</span>
          <div style="flex:1; height:1.5px; background:var(--track);"></div>
        </div>

        <label style="display:block; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px;">Email Address</label>
        <input placeholder="you@email.com" style="width:100%; box-sizing:border-box; border:1.5px solid var(--line); border-radius:10px; padding:13px 14px; font-family:'Archivo',sans-serif; font-size:15px; color:var(--text); background:var(--bg); outline:none; margin-bottom:18px;" style-focus="box-shadow:3px 3px 0 #F3C44C; background:var(--surface);" />

        <button style="width:100%; cursor:pointer; border:none; background:var(--solid); color:var(--on-solid); border-radius:999px; padding:14px; font-family:'Archivo'; font-weight:800; font-size:16px;" style-hover="background:var(--solid-hover);">Continue →</button>
      </div>

      <div style="text-align:center; margin-top:18px; font-family:'Archivo'; font-size:14px; color:var(--muted);">
        New to the Cellar? <a href="#" style="font-family:'Archivo'; font-weight:800; color:var(--text); text-decoration:none; border-bottom:2px solid #F3C44C;">Create an account</a>
      </div>
      <div style="text-align:center; margin-top:20px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; color:var(--faint);">Secured by Clerk</div>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
